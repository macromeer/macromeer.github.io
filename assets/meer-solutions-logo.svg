<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Hintergrund -->
  <rect width="300" height="300" fill="#E8E8E8"/>
  
  <!-- M-Monogramm (blockig, Windows 95 Style) -->
  <g transform="translate(150, 120)">
    <!-- Links -->
    <rect x="-40" y="-40" width="12" height="80" fill="#222222"/>
    <rect x="-40" y="-40" width="80" height="12" fill="#222222"/>
    <rect x="32" y="-40" width="12" height="80" fill="#222222"/>
    <!-- Mitte -->
    <rect x="-8" y="-40" width="12" height="40" fill="#222222"/>
    <rect x="-8" y="0" width="40" height="12" fill="#222222"/>
  </g>
  
  <!-- Text "Meer Solutions" (90er-Jahre Sans) -->
  <text x="150" y="220" text-anchor="middle" font-family="Tahoma, Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#222222">Meer Solutions</text>
  
  <!-- Optional: feine Pixel-/Scanline-Linie (1-bit Optik) -->
  <line x1="40" y1="240" x2="260" y2="240" stroke="#222222" stroke-width="1" opacity="0.3"/>
</svg>
